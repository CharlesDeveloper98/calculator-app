<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Calculator</title>
    <style>
        /* Modern Glassmorphism Design */
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* High-energy fluid liquid gradient background */
            background: linear-gradient(135deg, #ff007f, #7f00ff, #00f0ff);
            background-size: 300% 300%;
            animation: fluidBg 10s ease infinite;
        }

        /* Animation to make the background look like moving liquid */
        @keyframes fluidBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The Frosted Glass Calculator Frame */
        .calculator { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); 
            width: 280px;
        }

        /* Glass Input Screen */
        input { 
            width: 100%; 
            height: 50px; 
            text-align: right; 
            margin-bottom: 20px; 
            font-size: 24px; 
            padding: 10px; 
            box-sizing: border-box; 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        /* Translucent Glass Buttons */
        button { 
            padding: 18px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            border-radius: 12px; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Glass shine hover effect */
        button:hover { 
            background: rgba(255, 255, 255, 0.25); 
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(1px);
        }

        /* Pop color accents for functions */
        button.operator { background: rgba(255, 149, 0, 0.4); border: 1px solid rgba(255, 149, 0, 0.5); }
        button.operator:hover { background: rgba(255, 149, 0, 0.6); }
        
        button.clear { background: rgba(255, 59, 48, 0.4); border: 1px solid rgba(255, 59, 48, 0.5); }
        button.clear:hover { background: rgba(255, 59, 48, 0.6); }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="screen" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="press('/')">/</button>
        <button onclick="press('*')">*</button>
        <button onclick="press('-')">-</button>
        
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="operator" onclick="press('+')">+</button>
        
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="operator" onclick="calculate()">=</button>
        
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('0')">0</button>
    </div>
</div>

<script>
    function press(value) {
        document.getElementById('screen').value += value;
    }
    function clearScreen() {
        document.getElementById('screen').value = '';
    }
    function calculate() {
        try {
            let result = eval(document.getElementById('screen').value);
            document.getElementById('screen').value = result;
        } catch (error) {
            document.getElementById('screen').value = 'Error';
        }
    }
</script>

</body>
</html>
