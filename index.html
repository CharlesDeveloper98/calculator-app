<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Calculator</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --gray-btn: #a5a5a5;
            --gray-btn-text: #000000;
            --dark-btn: #333333;
            --dark-btn-text: #ffffff;
            --orange-btn: #ff9f0a;
            --orange-btn-text: #ffffff;
            --settings-bg: rgba(28, 28, 30, 0.95);
            --settings-item-bg: #2c2c2e;
            --settings-text: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f7;
            --text-color: #000000;
            --gray-btn: #e5e5ea;
            --gray-btn-text: #000000;
            --dark-btn: #ffffff;
            --dark-btn-text: #000000;
            --orange-btn: #ff9500;
            --orange-btn-text: #ffffff;
            --settings-bg: rgba(242, 242, 247, 0.95);
            --settings-item-bg: #ffffff;
            --settings-text: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        /* Settings Button iOS Style */
        .settings-trigger {
            position: absolute;
            top: 40px;
            right: 20px;
            background: none;
            border: none;
            color: var(--orange-btn);
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
        }

        /* Display Panel */
        .display-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            width: 100%;
            padding: 10px;
            min-height: 120px;
        }

        .display {
            font-size: 70px;
            font-weight: 300;
            text-align: right;
            white-space: nowrap;
            max-width: 100%;
            overflow-x: auto;
        }

        /* Calculator Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .btn {
            border: none;
            border-radius: 50%;
            font-size: 32px;
            font-weight: 400;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1;
            cursor: pointer;
            transition: filter 0.1s;
        }

        .btn:active {
            filter: brightness(1.4);
        }

        .btn-gray {
            background-color: var(--gray-btn);
            color: var(--gray-btn-text);
            font-size: 28px;
        }

        .btn-dark {
            background-color: var(--dark-btn);
            color: var(--dark-btn-text);
        }

        .btn-orange {
            background-color: var(--orange-btn);
            color: var(--orange-btn-text);
        }
        
        .btn-orange.active {
            background-color: #ffffff;
            color: var(--orange-btn);
        }

        .zero {
            grid-column: span 2;
            border-radius: 50px;
            aspect-ratio: auto;
            height: 100%;
            justify-content: flex-start;
            padding-left: 32px;
        }

        /* Settings Modal iOS Overlay Style */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--settings-bg);
            color: var(--settings-text);
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 40px 20px;
            transition: background-color 0.3s;
            overflow-y: auto;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .settings-header h2 {
            font-size: 28px;
            font-weight: 600;
        }

        .done-btn {
            background: none;
            border: none;
            color: var(--orange-btn);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .settings-subheader {
            font-size: 13px;
            text-transform: uppercase;
            color: #8e8e93;
            margin-left: 10px;
            margin-bottom: 8px;
            font-weight: 500;
            margin-top: 20px;
        }

        .settings-subheader:first-of-type {
            margin-top: 0;
        }

        .options-list {
            background-color: var(--settings-item-bg);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            font-size: 17px;
            border-bottom: 0.5px solid #48484a;
            cursor: pointer;
        }

        [data-theme="light"] .option-item {
            border-bottom: 0.5px solid #c6c6c8;
        }

        .option-item:last-child {
            border-bottom: none;
        }

        .checkmark {
            color: var(--orange-btn);
            font-weight: bold;
            display: none;
        }

        .option-item.selected .checkmark {
            display: block;
        }
    </style>
</head>
<body>

    <button class="settings-trigger" id="openSettings">⚙️</button>

    <div class="display-container">
        <div class="display" id="display">0</div>
    </div>

    <div class="grid">
        <button class="btn btn-gray" onclick="clearDisplay()" id="clear-btn">AC</button>
        <button class="btn btn-gray" onclick="toggleSign()">+/-</button>
        <button class="btn btn-gray" onclick="inputPercent()">%</button>
        <button class="btn btn-orange op-btn" data-op="/">÷</button>

        <button class="btn btn-dark" onclick="inputNum('7')">7</button>
        <button class="btn btn-dark" onclick="inputNum('8')">8</button>
        <button class="btn btn-dark" onclick="inputNum('9')">9</button>
        <button class="btn btn-orange op-btn" data-op="*">×</button>

        <button class="btn btn-dark" onclick="inputNum('4')">4</button>
        <button class="btn btn-dark" onclick="inputNum('5')">5</button>
        <button class="btn btn-dark" onclick="inputNum('6')">6</button>
        <button class="btn btn-orange op-btn" data-op="-">−</button>

        <button class="btn btn-dark" onclick="inputNum('1')">1</button>
        <button class="btn btn-dark" onclick="inputNum('2')">2</button>
        <button class="btn btn-dark" onclick="inputNum('3')">3</button>
        <button class="btn btn-orange op-btn" data-op="+">+</button>

        <button class="btn btn-dark zero" onclick="inputNum('0')">0</button>
        <button class="btn btn-dark" onclick="inputDecimal()">.</button>
        <button class="btn btn-orange" onclick="calculate()">=</button>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-header">
            <h2 id="title-settings">Settings</h2>
            <button class="done-btn" id="closeSettings">Done</button>
        </div>
        
        <div class="settings-subheader" id="sub-theme">Theme</div>
        <div class="options-list" id="theme-group">
            <div class="option-item" data-value="system" id="opt-system">
                <span id="txt-sys-theme">System</span>
                <span class="checkmark">✓</span>
            </div>
            <div class="option-item" data-value="dark" id="opt-dark">
                <span id="txt-dark-theme">Dark</span>
                <span class="checkmark">✓</span>
            </div>
            <div class="option-item" data-value="light" id="opt-light">
                <span id="txt-light-theme">Light</span>
                <span class="checkmark">✓</span>
            </div>
        </div>

        <div class="settings-subheader" id="sub-lang">Languages</div>
        <div class="options-list" id="lang-group">
            <div class="option-item lang-option" data-value="system" id="lang-system">
                <span id="txt-sys-lang">System</span>
                <span class="checkmark">✓</span>
            </div>
            <div class="option-item lang-option" data-value="ru" id="lang-ru">
                <span>Russian</span>
                <span class="checkmark">✓</span>
            </div>
            <div class="option-item lang-option" data-value="es" id="lang-es">
                <span>Spanish</span>
                <span class="checkmark">✓</span>
            </div>
        </div>
    </div>

    <script>
        // --- Translations Dictionary ---
        const i18n = {
            en: {
                settings: "Settings",
                done: "Done",
                theme: "Theme",
                languages: "Languages",
                system: "System",
                dark: "Dark",
                light: "Light",
                error: "Error"
            },
            ru: {
                settings: "Настройки",
                done: "Готово",
                theme: "Тема",
                languages: "Языки",
                system: "Системная",
                dark: "Темная",
                light: "Светлая",
                error: "Ошибка"
            },
            es: {
                settings: "Ajustes",
                done: "Hecho",
                theme: "Tema",
                languages: "Idiomas",
                system: "Sistema",
                dark: "Oscuro",
                light: "Claro",
                error: "Error"
            }
        };

        // --- Calculator Logic Variables ---
        let currentInput = "0";
        let previousInput = null;
        let activeOperator = null;
        let shouldResetDisplay = false;

        const displayEl = document.getElementById("display");
        const clearBtnEl = document.getElementById("clear-btn");

        function getActiveLangKey() {
            const savedLang = localStorage.getItem("calculator-lang") || "system";
            if (savedLang === "system") {
                const browserLang = navigator.language.slice(0, 2);
                return i18n[browserLang] ? browserLang : "en";
            }
            return savedLang;
        }

        function updateDisplay() {
            const langKey = getActiveLangKey();
            let formattedValue = currentInput;
            
            if (currentInput === "Error" || currentInput === "-Error") {
                formattedValue = currentInput.startsWith("-") ? "-" + i18n[langKey].error : i18n[langKey].error;
            } else {
                const parts = currentInput.split('.');
                parts[0] = Number(parts[0]).toLocaleString('en-US', { maximumFractionDigits: 0 });
                formattedValue = parts.join('.');
            }
            displayEl.innerText = formattedValue;
            clearBtnEl.innerText = currentInput === "0" && !previousInput ? "AC" : "C";
        }

        function inputNum(num) {
            if (currentInput === "0" || shouldResetDisplay) {
                currentInput = num;
                shouldResetDisplay = false;
            } else {
                if (currentInput.replace(/[^0-9]/g, "").length < 9) { // iOS limit 9 digits
                    currentInput += num;
                }
            }
            removeActiveOperatorHighlight();
            updateDisplay();
        }

        function inputDecimal() {
            if (shouldResetDisplay) {
                currentInput = "0.";
                shouldResetDisplay = false;
                updateDisplay();
                return;
            }
            if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = "0";
            if (clearBtnEl.innerText === "AC") {
                previousInput = null;
                activeOperator = null;
                removeActiveOperatorHighlight();
            }
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput !== "0") {
                currentInput = currentInput.startsWith("-") ? currentInput.slice(1) : "-" + currentInput;
                updateDisplay();
            }
        }

        function inputPercent() {
            currentInput = (parseFloat(currentInput) / 100).toString();
            updateDisplay();
        }

        // Handle Operation buttons
        document.querySelectorAll('.op-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const op = this.getAttribute('data-op');
                removeActiveOperatorHighlight();
                this.classList.add('active');
                
                if (activeOperator && !shouldResetDisplay) {
                    calculate();
                }
                
                previousInput = currentInput;
                activeOperator = op;
                shouldResetDisplay = true;
            });
        });

        function removeActiveOperatorHighlight() {
            document.querySelectorAll('.op-btn').forEach(btn => btn.classList.remove('active'));
        }

        function calculate() {
            if (!activeOperator || previousInput === null) return;

            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            let result = 0;

            switch (activeOperator) {
                case "+": result = prev + current; break;
                case "-": result = prev - current; break;
                case "*": result = prev * current; break;
                case "/": 
                    result = current === 0 ? "Error" : prev / current; 
                    break;
            }

            if (result !== "Error") {
                result = parseFloat(result.toPrecision(9)).toString();
            }

            currentInput = result;
            activeOperator = null;
            previousInput = null;
            shouldResetDisplay = true;
            removeActiveOperatorHighlight();
            updateDisplay();
        }

        // --- Theme & Language UI Configurations ---
        const modal = document.getElementById("settingsModal");
        const openBtn = document.getElementById("openSettings");
        const closeBtn = document.getElementById("closeSettings");
        const themeOptions = document.querySelectorAll("#theme-group .option-item");
        const langOptions = document.querySelectorAll(".lang-option");

        // Open & Close Settings Menu
        openBtn.onclick = () => modal.style.display = "flex";
        closeBtn.onclick = () => modal.style.display = "none";

        // Handle Theme System Logic
        function applyTheme(themeValue) {
            themeOptions.forEach(item => item.classList.remove("selected"));
            document.getElementById(`opt-${themeValue}`).classList.add("selected");

            if (themeValue === "system") {
                const isDarkMode = window.matchMedia("(prefers-color-scheme: dark)").matches;
                document.documentElement.setAttribute("data-theme", isDarkMode ? "dark" : "light");
            } else {
                document.documentElement.setAttribute("data-theme", themeValue);
            }
            localStorage.setItem("calculator-theme", themeValue);
        }

        themeOptions.forEach(option => {
            option.addEventListener("click", function() {
                const targetTheme = this.getAttribute("data-value");
                applyTheme(targetTheme);
            });
        });

        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
            if (localStorage.getItem("calculator-theme") === "system") {
                applyTheme("system");
            }
        });

        // --- Handle Localization Logic ---
        function applyLanguage(langValue) {
            langOptions.forEach(item => item.classList.remove("selected"));
            document.getElementById(`lang-${langValue}`).classList.add("selected");
            localStorage.setItem("calculator-lang", langValue);

            // Fetch contextual translations strings
            const langKey = getActiveLangKey();
            const data = i18n[langKey];

            // Re-render strings inside elements safely without altering numbers
            document.getElementById("title-settings").innerText = data.settings;
            document.getElementById("closeSettings").innerText = data.done;
            document.getElementById("sub-theme").innerText = data.theme;
            document.getElementById("sub-lang").innerText = data.languages;
            document.getElementById("txt-sys-theme").innerText = data.system;
            document.getElementById("txt-dark-theme").innerText = data.dark;
            document.getElementById("txt-light-theme").innerText = data.light;
            document.getElementById("txt-sys-lang").innerText = data.system;

            updateDisplay();
        }

        langOptions.forEach(option => {
            option.addEventListener("click", function() {
                const targetLang = this.getAttribute("data-value");
                applyLanguage(targetLang);
            });
        });

        // Load saved settings profiles on startup
        const savedTheme = localStorage.getItem("calculator-theme") || "system";
        applyTheme(savedTheme);

        const savedLang = localStorage.getItem("calculator-lang") || "system";
        applyLanguage(savedLang);
    </script>
</body>
</html>
