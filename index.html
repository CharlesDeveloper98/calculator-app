<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        /* Base styles using variables for colors */
        :root {
            --bg-color: #f0f2f5;
            --calc-bg: white;
            --text-color: #333;
            --btn-bg: #e0e0e0;
            --btn-hover: #d0d0d0;
        }

        /* Dark mode color variations */
        [data-theme="dark"] {
            --bg-color: #1e1e24;
            --calc-bg: #2a2a32;
            --text-color: white;
            --btn-bg: #44444f;
            --btn-hover: #555564;
        }

        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: var(--bg-color); margin: 0; transition: background 0.3s; }
        .calculator { border: 2px solid #ccc; padding: 20px; border-radius: 10px; background: var(--calc-bg); box-shadow: 0px 4px 10px rgba(0,0,0,0.1); transition: background 0.3s; }
        input { width: 100%; height: 40px; text-align: right; margin-bottom: 10px; font-size: 18px; padding: 5px; box-sizing: border-box; background: var(--calc-bg); color: var(--text-color); border: 1px solid #ccc; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; background-color: var(--btn-bg); color: var(--text-color); border-radius: 5px; transition: background 0.2s; }
        button:hover { background-color: var(--btn-hover); }
        button.operator { background-color: #ff9500; color: white; }
        button.clear { background-color: #ff3b30; color: white; }
        
        /* Theme toggle button styling */
        .theme-btn { margin-bottom: 15px; padding: 10px 20px; border-radius: 20px; border: 1px solid #ccc; background: var(--calc-bg); color: var(--text-color); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌓 Change Theme</button>

<div class="calculator">
    <input type="text" id="screen" readonly>
    <div class="buttons">
        <button class="clear" onclick="clearScreen()">C</button>
        <button onclick="press('/')">/</button>
        <button onclick="press('*')">*</button>
        <button onclick="press('-')">-</button>
        
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button class="operator" onclick="press('+')">+</button>
        
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button class="operator" onclick="calculate()">=</button>
        
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('0')">0</button>
    </div>
</div>

<script>
    function press(value) {
        document.getElementById('screen').value += value;
    }
    function clearScreen() {
        document.getElementById('screen').value = '';
    }
    function calculate() {
        try {
            let result = eval(document.getElementById('screen').value);
            document.getElementById('screen').value = result;
        } catch (error) {
            document.getElementById('screen').value = 'Error';
        }
    }

    /* New function to handle switching themes */
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    }
</script>

</body>
</html>
