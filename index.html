<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            padding-bottom: 30px;
            overflow: hidden;
        }

        .calc-container {
            width: 100%;
            max-width: 400px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }

        /* Screen Display Layout */
        .display {
            color: #ffffff;
            font-size: 80px;
            font-weight: 300;
            text-align: right;
            padding: 10px 15px;
            margin-bottom: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 4x5 Button Pad Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Standard round button rules */
        button {
            border: none;
            outline: none;
            aspect-ratio: 1; /* Makes width and height exactly equal */
            border-radius: 50%;
            font-size: 32px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.1s ease;
            user-select: none;
        }

        button:active {
            opacity: 0.6;
        }

        /* Light Gray Utility Accent Buttons (Top Row) */
        .btn-utility {
            background-color: #a5a5a5;
            color: #000000;
            font-size: 28px;
        }

        /* Dark Charcoal Number Buttons */
        .btn-number {
            background-color: #333333;
            color: #ffffff;
        }

        /* Vibrant Orange Math Operator Buttons */
        .btn-operator {
            background-color: #ff9f0a;
            color: #ffffff;
            font-size: 36px;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <!-- Huge white readout text -->
    <div class="display" id="screen">0</div>

    <div class="grid">
        <!-- Row 1 -->
        <button class="btn-utility" onclick="backspace()">⌫</button>
        <button class="btn-utility" onclick="clearScreen()">AC</button>
        <button class="btn-utility" onclick="percentage()">%</button>
        <button class="btn-operator" onclick="press('/')">÷</button>

        <!-- Row 2 -->
        <button class="btn-number" onclick="press('7')">7</button>
        <button class="btn-number" onclick="press('8')">8</button>
        <button class="btn-number" onclick="press('9')">9</button>
        <button class="btn-operator" onclick="press('*')">×</button>

        <!-- Row 3 -->
        <button class="btn-number" onclick="press('4')">4</button>
        <button class="btn-number" onclick="press('5')">5</button>
        <button class="btn-number" onclick="press('6')">6</button>
        <button class="btn-operator" onclick="press('-')">−</button>

        <!-- Row 4 -->
        <button class="btn-number" onclick="press('1')">1</button>
        <button class="btn-number" onclick="press('2')">2</button>
        <button class="btn-number" onclick="press('3')">3</button>
        <button class="btn-operator" onclick="press('+')">+</button>

        <!-- Row 5 -->
        <button class="btn-number" onclick="toggleSign()">+/-</button>
        <button class="btn-number" onclick="press('0')">0</button>
        <button class="btn-number" onclick="press('.')">.</button>
        <button class="btn-operator" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let currentInput = "0";
    const screen = document.getElementById('screen');

    function updateDisplay() {
        screen.textContent = currentInput;
    }

    function press(value) {
        // Prevent stacking calculation symbols into broken syntax expressions
        const operators = ['+', '-', '*', '/'];
        if (operators.includes(value) && operators.includes(currentInput.slice(-1))) {
            return; 
        }

        if (currentInput === "0" && !operators.includes(value) && value !== '.') {
            currentInput = value;
        } else {
            currentInput += value;
        }
        updateDisplay();
    }

    function clearScreen() {
        currentInput = "0";
        updateDisplay();
    }

    function backspace() {
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = "0";
        }
        updateDisplay();
    }

    function percentage() {
        try {
            let result = eval(currentInput) / 100;
            currentInput = String(result);
            updateDisplay();
        } catch {
            currentInput = "Error";
            updateDisplay();
        }
    }

    function toggleSign() {
        if (currentInput !== "0" && currentInput !== "Error") {
            if (currentInput.startsWith('-')) {
                currentInput = currentInput.slice(1);
            } else {
                currentInput = '-' + currentInput;
            }
            updateDisplay();
        }
    }

    function calculate() {
        try {
            // Evaluates and resolves math operations safely
            let result = eval(currentInput);
            currentInput = String(result);
            updateDisplay();
        } catch (error) {
            currentInput = "Error";
            updateDisplay();
        }
    }
</script>

</body>
</html>
